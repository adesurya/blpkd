# docker-compose.gpu.yml
# GPU overlay — adds NVIDIA GPU access to workers
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# Prerequisites:
#   - NVIDIA driver installed on host
#   - nvidia-container-toolkit installed
#   - Verify: nvidia-smi

name: vision-platform

services:
  worker-gpu:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1          # set to "all" for multi-GPU
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      # video capability enables NVENC/NVDEC hardware codec

  api:
    environment:
      - YOLO_DEVICE=cuda
      - INSIGHTFACE_DEVICE=cuda
      - COMPRESSION_CODEC=h264_nvenc
      - GPU_DECODE=true
