# infrastructure/nginx/nginx.conf
worker_processes auto;

events {
    worker_connections 2048;
}

http {
    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    # Gzip
    gzip on;
    gzip_types application/json text/plain application/javascript;

    # Upstream services
    upstream vision_api {
        server api:8000;
        keepalive 32;
    }

    upstream minio_console {
        server minio:9001;
    }

    upstream flower_ui {
        server flower:5555;
    }

    upstream grafana_ui {
        server grafana:3000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # API
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://vision_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            # Large file uploads
            client_max_body_size 5G;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Health check (no rate limit)
        location /health {
            proxy_pass http://vision_api/health;
        }

        # Prometheus metrics (no rate limit)
        location /metrics {
            proxy_pass http://vision_api/metrics;
        }

        # WebSocket for live stream previews
        location /ws/ {
            proxy_pass http://vision_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # MinIO Console UI (internal only)
        location /minio/ {
            proxy_pass http://minio_console/;
            proxy_set_header Host $host;
        }

        # Flower (Celery UI)
        location /flower/ {
            proxy_pass http://flower_ui/;
        }

        # Grafana
        location /grafana/ {
            proxy_pass http://grafana_ui/;
        }
    }
}
