# docker-compose.yml — MVP Full Stack
# Run: docker compose up -d
# With GPU: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

name: vision-platform

services:
  # ── API Server ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: vision-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./models:/app/models     # AI model files
      - temp_data:/tmp/vision    # temporary processing files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks: [vision-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── CPU Worker (analytics, webhooks, aggregation) ──────────────
  worker-cpu:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    container_name: vision-worker-cpu
    command: celery -A workers.celery_app worker -Q cpu_tasks -c 4 --loglevel=info --include=workers.detection_tasks
    env_file: .env
    volumes:
      - ./models:/app/models
      - temp_data:/tmp/vision
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks: [vision-net]

  # ── GPU Worker (detection, face recognition, compression) ──────
  worker-gpu:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.gpu_worker
    container_name: vision-worker-gpu
    command: celery -A workers.celery_app worker -Q gpu_tasks -c 1 --pool=solo --loglevel=info --include=workers.detection_tasks
    env_file: .env
    volumes:
      - ./models:/app/models
      - temp_data:/tmp/vision
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks: [vision-net]
    # GPU access — enabled in docker-compose.gpu.yml overlay
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Celery Beat (periodic tasks scheduler) ────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    container_name: vision-celery-beat
    command: celery -A workers.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    networks: [vision-net]

  # ── Flower (Celery monitoring UI) ─────────────────────────────
  flower:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    container_name: vision-flower
    command: celery -A workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped
    networks: [vision-net]

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vision-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-visiondb}
      POSTGRES_USER: ${POSTGRES_USER:-visionuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-visionpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks: [vision-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-visionuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: vision-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [vision-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO (Object Storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: vision-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console UI
    networks: [vision-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── MinIO Init (create buckets) ────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: vision-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set vision http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin123};
        mc mb -p vision/videos;
        mc mb -p vision/frames;
        mc mb -p vision/faces;
        mc mb -p vision/compressed;
        echo 'Buckets created';
      "
    networks: [vision-net]

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vision-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks: [vision-net]

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: vision-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks: [vision-net]
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: vision-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks: [vision-net]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  temp_data:

networks:
  vision-net:
    driver: bridge

